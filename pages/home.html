<!-- HOME PAGE: Shows list of available tournaments -->
<div class="hero" style="padding:20px 16px 14px;">
    <i class="fas fa-futbol hero-icon" style="font-size:56px;"></i>
    <h1 style="font-size:20px;">منصة بطولات <span>eFootball</span></h1>
    <p style="font-size:13px; margin-bottom:4px;">تاع <strong style="color:var(--neon);">Esam</strong></p>
    <p style="font-size:12px; color:var(--muted);">زايرو رواحكم بالتوفيق 🏆</p>
</div>

<!-- Final Match Special Card -->
<div class="card final-card animate__animated animate__pulse animate__infinite">
    <div class="final-badge">المباراة النهائية</div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
        <div style="text-align: center; flex: 1;">
            <div style="font-weight: 900; color: var(--neon); font-size: 16px;">djcm_djellabi_00</div>
            <div style="font-size: 10px; color: var(--muted);">FINALIST</div>
        </div>
        
        <div style="padding: 0 15px; font-weight: 900; color: var(--muted);">VS</div>
        
        <div style="text-align: center; flex: 1;">
            <div style="font-weight: 900; color: var(--neon-blue); font-size: 16px;">Kacimo</div>
            <div style="font-size: 10px; color: var(--muted);">FINALIST</div>
        </div>
    </div>

    <div class="vote-section">
        <button class="vote-btn" onclick="toast('تم تسجيل تصويتك لـ djcm_djellabi_00')">
            <i class="fas fa-vote-yea"></i>
            صوت لـ Djellabi
        </button>
        <button class="vote-btn" onclick="toast('تم تسجيل تصويتك لـ Kacimo')">
            <i class="fas fa-vote-yea"></i>
            صوت لـ Kacimo
        </button>
    </div>
    
    <div style="text-align: center; margin-top: 10px; font-size: 11px; color: var(--muted);">
        <i class="fas fa-users"></i> تصويت الجماهير مفتوح الآن
    </div>
</div>

<div id="tournaments-list">
    <div class="empty-state"><i class="fas fa-spinner fa-spin"></i>
        <p>جاري التحميل...</p>
    </div>
</div>
